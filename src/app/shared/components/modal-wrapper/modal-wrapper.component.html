<!-- Backdrop + Flex container -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm overflow-y-auto animate-fade-in"
  (click)="close.emit()"
   tabindex="0" (keydown.enter)="close.emit()">
  <!-- Modal Panel -->
  <div
    class="relative w-full bg-white rounded-2xl shadow-2xl overflow-hidden ring-1 ring-black/5 transform transition-all animate-fadeInUp"
    [class]="maxWidthClass"
    (click)="$event.stopPropagation()"
     tabindex="0" (keydown.enter)="$event.stopPropagation()">

    <!-- ── Header: Primary (azul JMG) ── -->
    @if (variant === 'primary') {
      <div
        class="px-6 py-5 bg-[#003B73] flex items-center justify-between sticky top-0 z-10"
        >
        <h2 class="text-xl font-bold text-white">{{ title }}</h2>
        <button
          type="button"
          (click)="close.emit()"
          class="text-white/70 hover:text-white transition-colors p-2 rounded-full hover:bg-white/10"
          aria-label="Cerrar"
          >
          <lucide-icon name="x" [size]="18" strokeWidth="1.5"></lucide-icon>
        </button>
      </div>
    }

    <!-- ── Header: Neutral (gris claro) ── -->
    @if (variant === 'neutral') {
      <div
        class="px-6 py-4 border-b border-gray-100 bg-gradient-to-r from-gray-50 to-white flex items-center justify-between"
        >
        <div>
          <h2 class="text-xl font-bold text-gray-900">{{ title }}</h2>
          @if (subtitle) {
            <p class="text-sm text-gray-500 mt-1">{{ subtitle }}</p>
          }
        </div>
        <button
          type="button"
          (click)="close.emit()"
          class="p-2 rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors"
          aria-label="Cerrar"
          >
          <lucide-icon name="x" [size]="18" strokeWidth="1.5"></lucide-icon>
        </button>
      </div>
    }

    <!-- ── Body: proyectado con ng-content ── -->
    <div class="p-6">
      <ng-content></ng-content>
    </div>

  </div>
</div>
