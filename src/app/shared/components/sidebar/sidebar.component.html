<aside (mouseenter)="onMouseEnter()" 
       (mouseleave)="onMouseLeave()"
       [ngClass]="{'w-72': isExpanded, 'w-20': !isExpanded}" 
       class="flex flex-col h-screen bg-white border-r border-gray-100 transition-all duration-300 ease-in-out relative z-50 shadow-lg">

  <!-- Logo Area -->
  <div class="p-6 flex justify-center border-b border-gray-50 min-h-[100px] items-center overflow-hidden">
    <div class="transition-all duration-300 flex items-center justify-center">
      <img src="images/jmg_logo.png" alt="JMG Logo" 
           [ngClass]="{'max-h-14': isExpanded, 'max-h-10': !isExpanded}"
           class="w-auto object-contain transition-all duration-300">
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 px-3 py-6 space-y-1.5 overflow-y-auto overflow-x-hidden">
    <a *ngFor="let item of menuItems" 
       [routerLink]="item.route" 
       routerLinkActive="active-link"
       [title]="!isExpanded ? item.label : ''"
       class="flex items-center gap-4 px-4 py-3.5 text-gray-500 rounded-2xl transition-all duration-200 hover:bg-gray-50 group no-underline relative">
      <i [class]="item.icon" class="text-xl flex-shrink-0 transition-colors group-hover:text-green-600"></i>
      <span class="text-[15px] font-semibold whitespace-nowrap transition-all duration-300" 
            [ngClass]="{'opacity-100 w-auto': isExpanded, 'opacity-0 w-0 absolute': !isExpanded}">
        {{ item.label }}
      </span>
    </a>
  </nav>

  <!-- Logout Section -->
  <div class="p-4 border-t border-gray-50">
    <button (click)="logout()" 
            [title]="!isExpanded ? 'Cerrar Sesión' : ''"
            class="flex items-center gap-4 w-full px-4 py-3.5 text-gray-400 rounded-2xl hover:bg-red-50 hover:text-red-500 transition-all duration-200 relative">
      <i class="bi bi-box-arrow-right text-xl flex-shrink-0"></i>
      <span class="text-[15px] font-semibold whitespace-nowrap transition-all duration-300"
            [ngClass]="{'opacity-100 w-auto': isExpanded, 'opacity-0 w-0 absolute': !isExpanded}">
        Cerrar Sesión
      </span>
    </button>
  </div>
</aside>
