<aside [ngClass]="{'w-72': !isCollapsed, 'w-20': isCollapsed}" 
       class="flex flex-col h-screen bg-white border-r border-gray-100 transition-all duration-300 relative z-50">
  
  <!-- Toggle Button -->
  <button (click)="toggleSidebar()" 
          class="absolute -right-3 top-12 flex h-6 w-6 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-400 hover:text-green-600 shadow-sm z-[60] transition-transform duration-300"
          [class.rotate-180]="isCollapsed">
    <i class="bi bi-chevron-left text-[10px]"></i>
  </button>

  <!-- Logo Area -->
  <div class="p-8 flex justify-center border-b border-gray-50 min-h-[120px] items-center overflow-hidden">
    <div class="transition-all duration-300 flex items-center justify-center" [class.scale-90]="isCollapsed">
      <img src="images/jmg_logo.png" alt="JMG Logo" 
           [ngClass]="{'max-h-16': !isCollapsed, 'max-h-10': isCollapsed}"
           class="w-auto object-contain transition-all duration-300">
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 px-3 py-8 space-y-1.5 overflow-y-auto">
    <a *ngFor="let item of menuItems" 
       [routerLink]="item.route" 
       routerLinkActive="active-link"
       class="flex items-center gap-4 px-4 py-3.5 text-gray-500 rounded-2xl transition-all duration-200 hover:bg-gray-50 group no-underline overflow-hidden">
      <i [class]="item.icon" class="text-xl flex-shrink-0 transition-colors group-hover:text-green-600"></i>
      <span class="text-[15px] font-semibold whitespace-nowrap transition-all duration-300" 
            [ngClass]="{'opacity-100 w-auto': !isCollapsed, 'opacity-0 w-0 pointer-events-none': isCollapsed}">
        {{ item.label }}
      </span>
    </a>
  </nav>

  <!-- Logout Section -->
  <div class="p-4 border-t border-gray-50">
    <button (click)="logout()" 
            class="flex items-center gap-4 w-full px-4 py-3.5 text-gray-400 rounded-2xl hover:bg-red-50 hover:text-red-500 transition-all duration-200 overflow-hidden">
      <i class="bi bi-box-arrow-right text-xl flex-shrink-0"></i>
      <span class="text-[15px] font-semibold whitespace-nowrap transition-all duration-300"
            [ngClass]="{'opacity-100 w-auto': !isCollapsed, 'opacity-0 w-0 pointer-events-none': isCollapsed}">
        Cerrar Sesión
      </span>
    </button>
  </div>
</aside>
