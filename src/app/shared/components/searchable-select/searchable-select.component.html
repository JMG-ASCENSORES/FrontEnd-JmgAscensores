<div class="space-y-1.5 relative w-full">
  <label class="text-xs font-bold text-slate-500 uppercase">{{ label }} <span class="text-red-500">*</span></label>
  <input 
    type="text" 
    [value]="searchTerm()"
    (input)="onInput($event)"
    [placeholder]="placeholder"
    class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all text-slate-700 bg-white"
  >

  <!-- Dropdown List -->
  <div *ngIf="showDropdown() && filteredOptions().length > 0" class="absolute z-50 w-full mt-1 bg-white border border-gray-100 rounded-lg shadow-xl max-h-60 overflow-y-auto">
    <div 
      *ngFor="let opt of filteredOptions()" 
      (click)="selectOption(opt)"
      class="px-4 py-3 hover:bg-slate-50 cursor-pointer border-b border-gray-50 last:border-0 transition-colors flex items-center gap-3"
    >
       <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold">
          {{ initials(opt) }}
       </div>
       <div>
          <div class="font-bold text-slate-700 text-sm">{{ displayFn(opt) }}</div>
          <div *ngIf="subDisplayFn" class="text-xs text-slate-400">{{ subDisplayFn(opt) }}</div>
       </div>
    </div>
  </div>
   
   <!-- No results -->
   <div *ngIf="showDropdown() && filteredOptions().length === 0 && searchTerm()" class="absolute z-50 w-full mt-1 bg-white border border-gray-100 rounded-lg shadow-xl p-4 text-center text-slate-500 text-sm">
      No se encontraron resultados para "{{ searchTerm() }}"
   </div>
</div>
