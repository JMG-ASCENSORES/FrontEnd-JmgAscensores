<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" (click)="close.emit()">
  <div
    class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title"
    (click)="$event.stopPropagation()"
  >
    <div
      class="px-8 pt-8 pb-4 text-center"
      [ngClass]="{
        'bg-red-50': confirmVariant === 'danger',
        'bg-amber-50': confirmVariant === 'warning',
        'bg-jmg-muted': confirmVariant === 'primary'
      }"
    >
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4"
        [ngClass]="{
          'bg-red-100': confirmVariant === 'danger',
          'bg-amber-100': confirmVariant === 'warning',
          'bg-jmg-light': confirmVariant === 'primary'
        }"
      >
        <lucide-icon
          [name]="icon"
          [size]="36"
          strokeWidth="1.5"
          [ngClass]="{
            'text-red-500': confirmVariant === 'danger',
            'text-amber-500': confirmVariant === 'warning',
            'text-jmg': confirmVariant === 'primary'
          }"
        ></lucide-icon>
      </div>
      <h2 class="text-xl font-bold text-slate-800">{{ title }}</h2>
    </div>

    <div class="p-8 text-center">
      <p class="text-slate-600 mb-6">{{ message }}</p>

      @if (errorMessage) {
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg mb-6 text-left">
          <div class="flex items-start gap-3">
            <lucide-icon name="alert-circle" [size]="20" class="text-red-500 shrink-0 mt-0.5"></lucide-icon>
            <p class="text-sm text-red-700">{{ errorMessage }}</p>
          </div>
        </div>
      }

      <div class="flex gap-4 justify-center">
        <button
          class="px-6 py-2.5 rounded-xl font-semibold text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors"
          (click)="close.emit()"
          [disabled]="isLoading"
        >
          {{ cancelText }}
        </button>
        <button
          class="px-6 py-2.5 rounded-xl font-semibold text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
          [ngClass]="{
            'bg-red-500 hover:bg-red-600 shadow-lg shadow-red-500/30': confirmVariant === 'danger',
            'bg-amber-500 hover:bg-amber-600 shadow-lg shadow-amber-500/30': confirmVariant === 'warning',
            'bg-jmg hover:bg-jmg-dark shadow-lg shadow-blue-900/20': confirmVariant === 'primary'
          }"
          (click)="confirm.emit()"
          [disabled]="isLoading"
        >
          @if (isLoading) {
            <span class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
          }
          {{ confirmText }}
        </button>
      </div>
    </div>
  </div>
</div>
