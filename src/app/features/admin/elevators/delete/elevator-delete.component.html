<div class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center zs-50 backdrop-blur-sm p-4 z-50">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up">

    <!-- Header -->
    <div class="bg-red-50 p-6 flex flex-col items-center justify-center border-b border-red-100">
      <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mb-4">
        <i class="bi bi-exclamation-triangle-fill text-4xl text-red-500"></i>
      </div>
      <h2 class="text-2xl font-bold text-slate-800 text-center">¿Eliminar Equipo?</h2>
    </div>

    <!-- Body -->
    <div class="p-8 text-center">
      <p class="text-slate-600 mb-6">
        Estás a punto de eliminar el equipo <span class="font-bold text-slate-900">{{ elevator.numero_serie }}</span>
        ({{ elevator.modelo || 'Sin modelo' }}).
        <br><br>
        Esta acción es irreversible y eliminará todo el historial de mantenimientos asociado.
      </p>

      <!-- Error Message -->
      @if (error()) {
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg mb-6 text-left">
          <div class="flex items-center">
            <i class="bi bi-exclamation-circle-fill text-red-500 mr-3 text-xl"></i>
            <p class="text-red-700 font-medium text-sm">{{ error() }}</p>
          </div>
        </div>
      }

      <!-- Actions -->
      <div class="flex gap-4 justify-center">
        <button (click)="close.emit()" class="px-6 py-3 rounded-xl font-bold text-slate-600 hover:bg-slate-100 transition-colors">
          Cancelar
        </button>
        <button
          (click)="confirmDelete()"
          [disabled]="isSubmitting()"
          class="px-8 py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
          >
          @if (isSubmitting()) {
            <span class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
          }
          {{ isSubmitting() ? 'Eliminando...' : 'Sí, Eliminar' }}
        </button>
      </div>
    </div>
  </div>
</div>
