<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden animate-fade-in-up">

    <!-- Header -->
    <div class="bg-jmg p-6 flex justify-between items-center">
      <h2 class="text-2xl font-bold text-white flex items-center gap-3">
        <lucide-icon name="square-pen" [size]="16" strokeWidth="1.5"></lucide-icon> Editar Equipo
      </h2>
      <button (click)="close.emit()" class="text-white hover:text-slate-200 transition-colors">
        <lucide-icon name="x" [size]="24" strokeWidth="1.5"></lucide-icon>
      </button>
    </div>

    <!-- Body -->
    <div class="p-8 max-h-[80vh] overflow-y-auto">
      <form (ngSubmit)="onSubmit()" #elevatorForm="ngForm" class="space-y-6">

        <!-- Cliente Selection -->
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Cliente Asociado <span class="text-red-500">*</span></label>
          <select
            [(ngModel)]="formData.cliente_id"
            name="cliente_id"
            required
            class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
            >
            <option [ngValue]="null" disabled>Seleccione un cliente</option>
            @for (client of clients(); track client) {
              <option [ngValue]="client.cliente_id">
                {{ client.nombre_comercial || client.contacto_nombre + ' ' + (client.contacto_apellido || '') }} ({{ client.tipo_cliente || 'N/A' }})
              </option>
            }
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Tipo Equipo -->
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Tipo de Equipo <span class="text-red-500">*</span></label>
            <select
              [(ngModel)]="formData.tipo_equipo"
              name="tipo_equipo"
              required
              class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
              >
              @for (type of equipmentTypes; track type) {
                <option [value]="type">{{ type }}</option>
              }
            </select>
          </div>

          <!-- Estado -->
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Estado Actual</label>
            <select
              [(ngModel)]="formData.estado"
              name="estado"
              class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
              >
              @for (status of statuses; track status) {
                <option [value]="status">{{ status }}</option>
              }
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Marca -->
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Marca</label>
            <input
              type="text"
              [(ngModel)]="formData.marca"
              name="marca"
              class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
              >
            </div>

            <!-- Modelo -->
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Modelo</label>
              <input
                type="text"
                [(ngModel)]="formData.modelo"
                name="modelo"
                class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
                >
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <!-- Numero Serie -->
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Número de Serie <span class="text-red-500">*</span></label>
                <input
                  type="text"
                  [(ngModel)]="formData.numero_serie"
                  name="numero_serie"
                  required
                  class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
                  >
                </div>

                <!-- Capacidades -->
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Capacidad (KG)</label>
                    <input
                      type="number"
                      [(ngModel)]="formData.capacidad_kg"
                      name="capacidad_kg"
                      #kgInput="ngModel"
                      min="0"
                      [class.border-red-500]="kgInput.invalid && kgInput.touched"
                      class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
                      >
                      @if (kgInput.invalid && kgInput.touched) {
                        <p class="text-xs text-red-500 mt-1">Debe ser ≥ 0</p>
                      }
                    </div>
                    <div>
                      <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Capacidad (Pers)</label>
                      <input
                        type="number"
                        [(ngModel)]="formData.capacidad_personas"
                        name="capacidad_personas"
                        #persInput="ngModel"
                        min="0"
                        [class.border-red-500]="persInput.invalid && persInput.touched"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
                        >
                        @if (persInput.invalid && persInput.touched) {
                          <p class="text-xs text-red-500 mt-1">Debe ser ≥ 0</p>
                        }
                      </div>
                    </div>
                  </div>

                  <!-- Pisos -->
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Cantidad de Pisos</label>
                    <input
                      type="number"
                      [(ngModel)]="formData.piso_cantidad"
                      name="piso_cantidad"
                      #pisoInput="ngModel"
                      min="1"
                      [class.border-red-500]="pisoInput.invalid && pisoInput.touched"
                      class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none"
                      >
                      @if (pisoInput.invalid && pisoInput.touched) {
                        <p class="text-xs text-red-500 mt-1">Debe ser ≥ 1</p>
                      }
                    </div>

                    <!-- Observaciones -->
                    <div>
                      <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Observaciones</label>
                      <textarea
                        [(ngModel)]="formData.observaciones"
                        name="observaciones"
                        rows="3"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-300 focus:border-jmg focus:ring-2 focus:ring-jmg/20 transition-all outline-none resize-none"
                      ></textarea>
                    </div>

                    <!-- Error Message -->
                    @if (error()) {
                      <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg">
                        <div class="flex items-center">
                          <lucide-icon name="alert-circle" [size]="20" strokeWidth="1.5" class="text-red-500 mr-3"></lucide-icon>
                          <p class="text-red-700 font-medium">{{ error() }}</p>
                        </div>
                      </div>
                    }

                    <!-- Actions -->
                    <div class="flex justify-end gap-4 pt-4 border-t border-slate-100">
                      <button type="button" (click)="close.emit()" class="px-6 py-3 rounded-xl font-bold text-slate-600 hover:bg-slate-100 transition-colors">
                        Cancelar
                      </button>
                      <button
                        type="submit"
                        [disabled]="elevatorForm.invalid || isSubmitting()"
                        class="px-8 py-3 rounded-xl font-bold text-white bg-jmg hover:bg-jmg-dark shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                        >
                        @if (isSubmitting()) {
                          <span class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
                        }
                        {{ isSubmitting() ? 'Actualizar...' : 'Actualizar Equipo' }}
                      </button>
                    </div>

                  </form>
                </div>
              </div>
            </div>
