<div class="flex h-screen bg-[#F8FAFC]">
  <!-- Reusable Sidebar -->
  <app-sidebar class="hidden md:block transition-all duration-300"></app-sidebar>

  <!-- Main Content -->
  <main class="flex-1 overflow-auto flex flex-col">
    <!-- Mobile Header -->
    <header class="bg-white px-6 py-4 flex justify-between items-center md:hidden border-b border-gray-100 shadow-sm">
      <div class="flex items-center">
        <img src="images/jmg_logo.png" alt="JMG Logo" class="h-8 w-auto">
      </div>
      <button (click)="logout()" class="text-sm text-red-500 font-bold bg-red-50 px-4 py-2 rounded-full hover:bg-red-100 transition-colors">
        Salir
      </button>
    </header>

    <!-- Content Area -->
    <div class="p-6 md:p-10 max-w-7xl mx-auto w-full">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
