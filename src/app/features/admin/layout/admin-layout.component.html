<div class="flex h-screen bg-slate-50">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
    <div class="p-4 border-b border-slate-700">
      <h1 class="text-xl font-bold">JMG Admin</h1>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a routerLink="/admin/dashboard" routerLinkActive="bg-blue-600 text-white" class="block px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors">
        Dashboard
      </a>
      <a routerLink="/admin/clients" routerLinkActive="bg-blue-600 text-white" class="block px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors">
        Clientes
      </a>
      <a routerLink="/admin/elevators" routerLinkActive="bg-blue-600 text-white" class="block px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors">
        Ascensores
      </a>
       <a routerLink="/admin/technicians" routerLinkActive="bg-blue-600 text-white" class="block px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors">
        Técnicos
      </a>
    </nav>
    <div class="p-4 border-t border-slate-700">
      <button (click)="logout()" class="w-full px-4 py-2 text-left text-red-400 hover:text-red-300">
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-auto flex flex-col">
    <header class="bg-white shadow p-4 flex justify-between items-center md:hidden">
      <h1 class="font-bold text-slate-900">JMG Admin</h1>
      <button (click)="logout()" class="text-sm text-red-500">Salir</button>
    </header>
    <div class="p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
