<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" (click)="onCancel()" tabindex="0" (keydown.enter)="onCancel()"></div>

  <!-- Modal Panel -->
  <div class="relative w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden ring-1 ring-black/5 transform transition-all animate-fadeInUp">

    <!-- Body -->
    <div class="p-6 text-center">
      <!-- Icon -->
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <lucide-icon name="alert-triangle" [size]="30" strokeWidth="1.5" class="text-red-600"></lucide-icon>
      </div>

      <h2 class="text-xl font-bold text-gray-900 mb-2">¿Eliminar Técnico?</h2>

      <p class="text-gray-500 mb-6">
        ¿Estás seguro que deseas eliminar a <span class="font-bold text-gray-800">{{ technician.nombre }} {{ technician.apellido }}</span>?
        <br><br>
        Esta acción desactivará su cuenta y no podrá ingresar al sistema.
      </p>

      <!-- Error Alert -->
      @if (errorMessage()) {
        <div class="bg-red-50 border border-red-200 p-3 rounded-lg mb-4 text-left">
          <p class="text-xs text-red-700 flex items-center gap-2">
            <lucide-icon name="x-circle" [size]="16" strokeWidth="1.5"></lucide-icon>
            {{ errorMessage() }}
          </p>
        </div>
      }

      <!-- Actions -->
      <div class="flex items-center justify-center gap-3">
        <button
          type="button"
          (click)="onCancel()"
          class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition-colors focus:ring-4 focus:ring-gray-100 w-full"
          >
          Cancelar
        </button>
        <button
          type="button"
          (click)="onDelete()"
          [disabled]="isDeleting()"
          class="px-5 py-2.5 rounded-lg bg-red-600 text-white font-medium hover:bg-red-700 transition-colors shadow-lg shadow-red-600/20 focus:ring-4 focus:ring-red-100 disabled:opacity-50 disabled:cursor-not-allowed w-full flex items-center justify-center gap-2"
          >
          @if (isDeleting()) {
            <span class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
          }
          Eliminar
        </button>
      </div>
    </div>
  </div>
</div>
