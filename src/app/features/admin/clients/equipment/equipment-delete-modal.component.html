<div class="fixed inset-0 z-[60] flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm" (click)="onClose()" tabindex="0" (keydown.enter)="onClose()"></div>

  <!-- Modal Panel -->
  <div class="relative w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden ring-1 ring-black/5">

    <!-- Header -->
    <div class="px-6 py-4 border-b border-gray-100 bg-gradient-to-r from-red-50 to-white flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
          <i class="bi bi-exclamation-triangle text-red-600 text-lg"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-900">Eliminar Equipo</h2>
      </div>
      <button (click)="onClose()" class="p-2 rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
        <i class="bi bi-x-lg text-lg"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6">

      <!-- Error Alert -->
      @if (errorMessage()) {
        <div class="mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
          <div class="flex">
            <i class="bi bi-exclamation-circle text-red-500 mr-3"></i>
            <p class="text-sm text-red-700">{{ errorMessage() }}</p>
          </div>
        </div>
      }

      <p class="text-gray-700 mb-4">¿Está seguro que desea eliminar este equipo?</p>

      <!-- Equipment Details -->
      <div class="bg-gray-50 rounded-lg p-4 space-y-2 mb-6">
        <div class="flex items-center gap-2">
          <i class="bi bi-building text-gray-400"></i>
          <span class="font-semibold text-gray-900">{{ equipment.marca }} {{ equipment.modelo }}</span>
        </div>
        <div class="flex items-center gap-2">
          <i class="bi bi-tag text-gray-400"></i>
          <span class="text-sm text-gray-600">{{ equipment.tipo_equipo }}</span>
        </div>
        @if (equipment.numero_serie) {
          <div class="flex items-center gap-2">
            <i class="bi bi-hash text-gray-400"></i>
            <span class="text-sm text-gray-600">Serie: {{ equipment.numero_serie }}</span>
          </div>
        }
      </div>

      <p class="text-sm text-red-600 font-medium">Esta acción no se puede deshacer.</p>
    </div>

    <!-- Actions -->
    <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-end gap-3">
      <button type="button" (click)="onClose()" class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-white transition-colors">
        Cancelar
      </button>
      <button (click)="onDelete()" [disabled]="isDeleting()" class="px-5 py-2.5 rounded-lg bg-red-600 text-white font-medium hover:bg-red-700 transition-colors shadow-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
        @if (isDeleting()) {
          <span class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
        }
        Eliminar
      </button>
    </div>
  </div>
</div>
