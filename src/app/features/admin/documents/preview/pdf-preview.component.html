<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in" (click)="close.emit()">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden" (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b border-gray-200 bg-slate-50">
      <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
        <i class="bi bi-file-earmark-pdf-fill text-red-500"></i>
        Vista Previa: {{ fileName }}
      </h3>
      <button (click)="close.emit()" class="text-gray-400 hover:text-gray-600 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200">
        <i class="bi bi-x-lg text-lg"></i>
      </button>
    </div>

    <!-- Content (Iframe) -->
    <div class="flex-1 bg-gray-100 p-0 relative">
        <iframe [src]="pdfUrl" class="w-full h-full border-none" type="application/pdf">
            <p>Tu navegador no puede mostrar este PDF. <a [href]="pdfUrl" download>Descárgalo aquí</a>.</p>
        </iframe>
    </div>

    <div class="p-4 border-t border-gray-200 bg-white flex justify-end gap-3">
      <button 
        (click)="close.emit()" 
        class="px-5 py-2.5 rounded-lg text-slate-600 font-bold hover:bg-slate-100 transition-colors"
      >
        Cancelar
      </button>
      
      <a 
        *ngIf="downloadUrl"
        [href]="downloadUrl"
        [download]="fileName"
        class="px-5 py-2.5 rounded-lg bg-[#003B73] text-white font-bold hover:bg-[#002a52] transition-colors flex items-center gap-2"
      >
        <i class="bi bi-download"></i>
        Descargar Archivo
      </a>
    </div>
  </div>
</div>
